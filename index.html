<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Feedbacks</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1e293b;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #facc15;
      --purple: #a78bfa;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 35%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .title h1 {
      font-size: 34px;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 8px;
    }

    .title p {
      color: var(--muted);
      font-size: 15px;
      max-width: 740px;
      line-height: 1.5;
    }

    .header-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .pill {
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid var(--border);
      color: var(--blue);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .status-banner {
      display: grid;
      grid-template-columns: 1.2fr 2fr;
      gap: 18px;
      margin-bottom: 24px;
    }

    @media (max-width: 850px) {
      .status-banner {
        grid-template-columns: 1fr;
      }

      .header-actions {
        align-items: flex-start;
      }
    }

    .status-card,
    .latest-card,
    .metric,
    .panel,
    .table-panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .status-card {
      border-radius: 22px;
      padding: 24px;
    }

    .status-card h2,
    .latest-card h2 {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .status-main {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-ok .status-dot {
      background: var(--green);
      box-shadow: 0 0 18px rgba(74, 222, 128, .6);
    }

    .status-atencao .status-dot {
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(250, 204, 21, .6);
    }

    .status-critico .status-dot {
      background: var(--red);
      box-shadow: 0 0 18px rgba(248, 113, 113, .6);
    }

    .status-main strong {
      font-size: 30px;
      color: var(--white);
    }

    .status-card p {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .latest-card {
      border-radius: 22px;
      padding: 24px;
    }

    .latest-card blockquote {
      color: var(--white);
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 14px;
      border-left: 4px solid var(--blue);
      padding-left: 14px;
    }

    .latest-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(6, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 1200px) {
      .cards {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 700px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }

    .metric {
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto -20px -40px auto;
      width: 95px;
      height: 95px;
      background: rgba(56, 189, 248, 0.08);
      border-radius: 50%;
    }

    .metric h3 {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .metric .value {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
    }

    .metric small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
    }

    .red { color: var(--red) !important; }
    .green { color: var(--green) !important; }
    .yellow { color: var(--yellow) !important; }
    .blue { color: var(--blue) !important; }
    .purple { color: var(--purple) !important; }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 1000px) {
      .analytics-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      border-radius: 22px;
      padding: 24px;
    }

    .panel h2,
    .table-panel h2 {
      font-size: 20px;
      color: var(--white);
      margin-bottom: 18px;
    }

    .bar-row {
      margin-bottom: 18px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .bar {
      height: 14px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(51,65,85,.6);
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .3s ease;
    }

    .bar-alerta { background: linear-gradient(90deg, #ef4444, #fb7185); }
    .bar-elogio { background: linear-gradient(90deg, #22c55e, #86efac); }
    .bar-neutro { background: linear-gradient(90deg, #eab308, #fde047); }

    .sentiment-boxes {
      display: grid;
      gap: 12px;
    }

    .sentiment-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
    }

    .sentiment-box span {
      color: var(--muted);
    }

    .sentiment-box strong {
      font-size: 22px;
    }

    .critical-section {
      margin-bottom: 24px;
    }

    .alerts-list {
      display: grid;
      gap: 12px;
    }

    .alert-item {
      background: rgba(127, 29, 29, 0.22);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 16px;
      padding: 16px;
    }

    .alert-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .alert-top strong {
      color: var(--white);
    }

    .alert-top span {
      color: var(--muted);
      font-size: 13px;
    }

    .alert-item p {
      color: #fecaca;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .alert-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .empty-alert {
      color: var(--muted);
      background: rgba(30,41,59,.65);
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .table-panel {
      border-radius: 22px;
      padding: 24px;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      background: #020617;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      min-width: 170px;
    }

    .filters input:focus,
    .filters select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    thead {
      background: #1e293b;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: #93c5fd;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.08em;
      position: sticky;
      top: 0;
      background: #1e293b;
      z-index: 1;
    }

    tbody tr:hover {
      background: rgba(30, 41, 59, 0.42);
    }

    .student {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .student small {
      color: var(--muted);
    }

    .feedback-text {
      max-width: 430px;
      line-height: 1.45;
      color: #dbeafe;
    }

    .badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .03em;
    }

    .badge.alerta {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.18);
      border: 1px solid rgba(248, 113, 113, 0.4);
    }

    .badge.elogio {
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.16);
      border: 1px solid rgba(134, 239, 172, 0.35);
    }

    .badge.neutro {
      color: #fef3c7;
      background: rgba(234, 179, 8, 0.16);
      border: 1px solid rgba(253, 224, 71, 0.35);
    }

    .sentimento {
      text-transform: capitalize;
      font-weight: 800;
    }

    .sentimento.positivo { color: var(--green); }
    .sentimento.negativo { color: var(--red); }
    .sentimento.neutro { color: var(--yellow); }

    .stars {
      color: #fbbf24;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .counter {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }

    .footer {
      margin-top: 24px;
      color: #64748b;
      font-size: 13px;
      text-align: center;
    }

    .loading,
    .error-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 28px;
      border-radius: 20px;
      color: var(--muted);
      text-align: center;
      margin-top: 40px;
    }

    .error-box {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.45);
      background: rgba(127, 29, 29, 0.2);
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="loading">Carregando feedbacks do Supabase...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://uikctrdnqcyuwymggruz.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpa2N0cmRucWN5dXd5bWdncnV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjM4MDEsImV4cCI6MjA5NDU5OTgwMX0.fY-1zeo6GuUfImLJhp0t1ismtPaoQOc6_TTI8DPcDgA";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    let dadosGlobais = [];

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatarData(dataISO) {
      if (!dataISO) return "Sem data";
      const data = new Date(dataISO);
      if (isNaN(data.getTime())) return "Data inválida";

      return data.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function limparNumero(numero) {
      if (!numero) return "Não informado";
      return String(numero).replace("@s.whatsapp.net", "");
    }

    function contar(dados, campo, valor) {
      return dados.filter(item => String(item[campo] || "").toUpperCase() === valor).length;
    }

    function porcentagem(valor, total) {
      if (!total) return 0;
      return Math.round((valor / total) * 100);
    }

    function estrelasVisual(qtd) {
      const n = Math.max(0, Math.min(5, Number(qtd || 0)));
      return "★".repeat(n) + "☆".repeat(5 - n);
    }

    function renderizarDashboard(dados) {
      dados = [...dados].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      const totalFeedbacks = dados.length;

      if (totalFeedbacks === 0) {
        document.getElementById("app").innerHTML = `
          <div class="loading">
            Nenhum feedback encontrado. Quando os alunos enviarem avaliações pelo WhatsApp, elas aparecerão aqui.
          </div>
        `;
        return;
      }

      const totalAlertas = contar(dados, "acao", "ALERTA");
      const totalElogios = contar(dados, "acao", "ELOGIO");
      const totalNeutros = contar(dados, "acao", "NEUTRO");

      const totalPositivos = dados.filter(item => String(item.sentimento || "").toLowerCase() === "positivo").length;
      const totalNegativos = dados.filter(item => String(item.sentimento || "").toLowerCase() === "negativo").length;
      const totalSentimentoNeutro = dados.filter(item => String(item.sentimento || "").toLowerCase() === "neutro").length;

      const mediaEstrelas = dados.reduce((acc, item) => acc + Number(item.estrelas || 0), 0) / totalFeedbacks;
      const mediaFormatada = mediaEstrelas.toFixed(1);

      const alunosUnicos = new Set(dados.map(item => limparNumero(item.numero_aluno))).size;

      const taxaAlerta = porcentagem(totalAlertas, totalFeedbacks);
      const taxaElogio = porcentagem(totalElogios, totalFeedbacks);
      const taxaNeutro = porcentagem(totalNeutros, totalFeedbacks);

      let statusTurma = "Saudável";
      let statusClasse = "status-ok";
      let statusDescricao = "A maior parte dos feedbacks não indica problemas críticos.";

      if (taxaAlerta >= 40) {
        statusTurma = "Crítico";
        statusClasse = "status-critico";
        statusDescricao = "Alta proporção de feedbacks negativos. Recomenda-se ação imediata.";
      } else if (taxaAlerta >= 20) {
        statusTurma = "Atenção";
        statusClasse = "status-atencao";
        statusDescricao = "Existem sinais relevantes de insatisfação. Vale acompanhar de perto.";
      }

      const ultimoFeedback = dados[0];

      const alertasCriticos = dados
        .filter(item => String(item.acao || "").toUpperCase() === "ALERTA")
        .slice(0, 5);

      const linhasAlertas = alertasCriticos.length
        ? alertasCriticos.map(item => `
          <div class="alert-item">
            <div class="alert-top">
              <strong>${escapeHtml(item.nome_aluno || "Aluno")}</strong>
              <span>${formatarData(item.timestamp)}</span>
            </div>
            <p>${escapeHtml(item.texto || "")}</p>
            <div class="alert-meta">
              <span>${escapeHtml(limparNumero(item.numero_aluno))}</span>
              <span>${estrelasVisual(item.estrelas)}</span>
            </div>
          </div>
        `).join("")
        : `<div class="empty-alert">Nenhum alerta crítico registrado.</div>`;

      const linhasTabela = dados.map(item => {
        const acao = String(item.acao || "NÃO INFORMADO").toUpperCase();
        const sentimento = String(item.sentimento || "não informado").toLowerCase();

        const badgeClass =
          acao === "ALERTA" ? "badge alerta" :
          acao === "ELOGIO" ? "badge elogio" :
          "badge neutro";

        const sentimentoClass =
          sentimento === "negativo" ? "sentimento negativo" :
          sentimento === "positivo" ? "sentimento positivo" :
          "sentimento neutro";

        return `
          <tr
            data-acao="${escapeHtml(acao)}"
            data-sentimento="${escapeHtml(sentimento)}"
            data-search="${escapeHtml(`${item.nome_aluno || ""} ${item.numero_aluno || ""} ${item.texto || ""}`.toLowerCase())}"
          >
            <td>${escapeHtml(item.id ?? "-")}</td>
            <td>${escapeHtml(formatarData(item.timestamp))}</td>
            <td>
              <div class="student">
                <strong>${escapeHtml(item.nome_aluno || "Aluno")}</strong>
                <small>${escapeHtml(limparNumero(item.numero_aluno))}</small>
              </div>
            </td>
            <td class="feedback-text">${escapeHtml(item.texto || "")}</td>
            <td><span class="${sentimentoClass}">${escapeHtml(sentimento)}</span></td>
            <td><span class="stars">${estrelasVisual(item.estrelas)}</span></td>
            <td><span class="${badgeClass}">${escapeHtml(acao)}</span></td>
          </tr>
        `;
      }).join("");

      document.getElementById("app").innerHTML = `
        <header class="header">
          <div class="title">
            <h1>Dashboard de Feedbacks dos Alunos</h1>
            <p>
              Monitoramento automático de avaliações recebidas pelo WhatsApp,
              com análise de sentimento por IA, registro em banco de dados e alertas inteligentes.
            </p>
          </div>

          <div class="header-actions">
            <div class="pill">Atualizado em ${formatarData(new Date().toISOString())}</div>
            <div class="pill">Fonte: Supabase / n8n</div>
          </div>
        </header>

        <section class="status-banner">
          <div class="status-card ${statusClasse}">
            <h2>Status geral da turma</h2>
            <div class="status-main">
              <span class="status-dot"></span>
              <strong>${statusTurma}</strong>
            </div>
            <p>${statusDescricao}</p>
          </div>

          <div class="latest-card">
            <h2>Último feedback recebido</h2>
            <blockquote>${escapeHtml(ultimoFeedback.texto || "Sem texto")}</blockquote>
            <div class="latest-meta">
              <span>Aluno: ${escapeHtml(ultimoFeedback.nome_aluno || "Aluno")}</span>
              <span>Data: ${escapeHtml(formatarData(ultimoFeedback.timestamp))}</span>
              <span>Ação: ${escapeHtml(ultimoFeedback.acao || "-")}</span>
              <span>Estrelas: ${estrelasVisual(ultimoFeedback.estrelas)}</span>
            </div>
          </div>
        </section>

        <section class="cards">
          <div class="metric">
            <h3>Total</h3>
            <div class="value blue">${totalFeedbacks}</div>
            <small>Avaliações recebidas</small>
          </div>

          <div class="metric">
            <h3>Alertas</h3>
            <div class="value red">${totalAlertas}</div>
            <small>${taxaAlerta}% do total</small>
          </div>

          <div class="metric">
            <h3>Elogios</h3>
            <div class="value green">${totalElogios}</div>
            <small>${taxaElogio}% do total</small>
          </div>

          <div class="metric">
            <h3>Neutros</h3>
            <div class="value yellow">${totalNeutros}</div>
            <small>${taxaNeutro}% do total</small>
          </div>

          <div class="metric">
            <h3>Média</h3>
            <div class="value purple">${mediaFormatada}</div>
            <small>Média de estrelas</small>
          </div>

          <div class="metric">
            <h3>Alunos</h3>
            <div class="value blue">${alunosUnicos}</div>
            <small>Alunos únicos</small>
          </div>
        </section>

        <section class="analytics-grid">
          <div class="panel">
            <h2>Distribuição por ação</h2>

            <div class="bar-row">
              <div class="bar-label">
                <span>ALERTA</span>
                <strong>${totalAlertas} (${taxaAlerta}%)</strong>
              </div>
              <div class="bar">
                <div class="bar-fill bar-alerta" style="width:${taxaAlerta}%"></div>
              </div>
            </div>

            <div class="bar-row">
              <div class="bar-label">
                <span>ELOGIO</span>
                <strong>${totalElogios} (${taxaElogio}%)</strong>
              </div>
              <div class="bar">
                <div class="bar-fill bar-elogio" style="width:${taxaElogio}%"></div>
              </div>
            </div>

            <div class="bar-row">
              <div class="bar-label">
                <span>NEUTRO</span>
                <strong>${totalNeutros} (${taxaNeutro}%)</strong>
              </div>
              <div class="bar">
                <div class="bar-fill bar-neutro" style="width:${taxaNeutro}%"></div>
              </div>
            </div>
          </div>

          <div class="panel">
            <h2>Resumo por sentimento</h2>

            <div class="sentiment-boxes">
              <div class="sentiment-box">
                <span>Positivos</span>
                <strong class="green">${totalPositivos}</strong>
              </div>

              <div class="sentiment-box">
                <span>Negativos</span>
                <strong class="red">${totalNegativos}</strong>
              </div>

              <div class="sentiment-box">
                <span>Neutros</span>
                <strong class="yellow">${totalSentimentoNeutro}</strong>
              </div>
            </div>
          </div>
        </section>

        <section class="panel critical-section">
          <h2>Últimos alertas críticos</h2>
          <div class="alerts-list">
            ${linhasAlertas}
          </div>
        </section>

        <section class="table-panel">
          <div class="table-header">
            <h2>Todos os feedbacks</h2>

            <div class="filters">
              <input id="searchInput" type="text" placeholder="Buscar aluno, número ou texto...">

              <select id="acaoFilter">
                <option value="TODOS">Todas as ações</option>
                <option value="ALERTA">ALERTA</option>
                <option value="ELOGIO">ELOGIO</option>
                <option value="NEUTRO">NEUTRO</option>
              </select>

              <select id="sentimentoFilter">
                <option value="todos">Todos os sentimentos</option>
                <option value="positivo">positivo</option>
                <option value="negativo">negativo</option>
                <option value="neutro">neutro</option>
              </select>
            </div>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Data</th>
                  <th>Aluno</th>
                  <th>Texto</th>
                  <th>Sentimento</th>
                  <th>Estrelas</th>
                  <th>Ação</th>
                </tr>
              </thead>
              <tbody id="feedbackTable">
                ${linhasTabela}
              </tbody>
            </table>
          </div>

          <div class="counter" id="counterText">
            Mostrando ${totalFeedbacks} de ${totalFeedbacks} feedbacks.
          </div>
        </section>

        <footer class="footer">
          Dashboard hospedado na nuvem e atualizado automaticamente com dados do Supabase.
        </footer>
      `;

      configurarFiltros();
    }

    function configurarFiltros() {
      const searchInput = document.getElementById("searchInput");
      const acaoFilter = document.getElementById("acaoFilter");
      const sentimentoFilter = document.getElementById("sentimentoFilter");
      const rows = Array.from(document.querySelectorAll("#feedbackTable tr"));
      const counterText = document.getElementById("counterText");

      function aplicarFiltros() {
        const busca = searchInput.value.toLowerCase().trim();
        const acao = acaoFilter.value;
        const sentimento = sentimentoFilter.value;

        let visiveis = 0;

        rows.forEach(row => {
          const rowAcao = row.dataset.acao;
          const rowSentimento = row.dataset.sentimento;
          const rowSearch = row.dataset.search;

          const matchBusca = !busca || rowSearch.includes(busca);
          const matchAcao = acao === "TODOS" || rowAcao === acao;
          const matchSentimento = sentimento === "todos" || rowSentimento === sentimento;

          const mostrar = matchBusca && matchAcao && matchSentimento;
          row.style.display = mostrar ? "" : "none";

          if (mostrar) visiveis++;
        });

        counterText.textContent = "Mostrando " + visiveis + " de " + rows.length + " feedbacks.";
      }

      searchInput.addEventListener("input", aplicarFiltros);
      acaoFilter.addEventListener("change", aplicarFiltros);
      sentimentoFilter.addEventListener("change", aplicarFiltros);
    }

    async function carregarFeedbacks() {
      const { data, error } = await supabaseClient
        .from("feedbacks")
        .select("*")
        .order("timestamp", { ascending: false });

      if (error) {
        document.getElementById("app").innerHTML = `
          <div class="error-box">
            <h2>Erro ao carregar dados do Supabase</h2>
            <p>${escapeHtml(error.message)}</p>
          </div>
        `;
        console.error(error);
        return;
      }

      dadosGlobais = data || [];
      renderizarDashboard(dadosGlobais);
    }

    carregarFeedbacks();

    setInterval(carregarFeedbacks, 30000);
  </script>
</body>
</html>
